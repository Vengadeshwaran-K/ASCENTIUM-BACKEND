spring.application.name=kyc

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/kyc_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=0000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- JWT ---
# Override in production via environment variable JWT_SECRET (min 32 bytes for HS256)
jwt.secret=${JWT_SECRET:change-me-in-production-0123456789abcdef}
jwt.expiration-ms=86400000

# --- Default admin (created on first startup if missing) ---
app.admin.email=admin@ascentium.com
app.admin.password=${ADMIN_PASSWORD:Admin@123}